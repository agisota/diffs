[mypy]
python_version = 3.10
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_configs = True
follow_imports = silent

# Strict-equivalent config on the 6 forensic modules.
# Per mypy issue #11401, `strict = True` does NOT propagate to per-module
# sections — every flag must be listed explicitly to actually take effect.

[mypy-docdiffops.forensic]
disallow_untyped_defs = True
disallow_any_generics = True
disallow_untyped_calls = True
warn_return_any = True
no_implicit_optional = True
warn_unused_ignores = True
disallow_incomplete_defs = True
strict_equality = True
disallow_subclassing_any = True
disallow_untyped_decorators = True
warn_unreachable = True
check_untyped_defs = True
extra_checks = True

