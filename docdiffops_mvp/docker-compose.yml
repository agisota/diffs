services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docdiff
      POSTGRES_PASSWORD: docdiff
      POSTGRES_DB: docdiff
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docdiff"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://docdiff:docdiff@db:5432/docdiff
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  worker:
    build: .
    command: celery -A docdiffops.worker.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://docdiff:docdiff@db:5432/docdiff
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
