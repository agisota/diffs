services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: docdiff
      POSTGRES_PASSWORD: docdiff
      POSTGRES_DB: docdiff
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docdiff"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://docdiff:docdiff@db:5432/docdiff
      # PR-5.5: semantic LLM comparator (opt-in via override).
      SEMANTIC_COMPARATOR_ENABLED: "${SEMANTIC_COMPARATOR_ENABLED:-false}"
      LLM_API_BASE: "${LLM_API_BASE:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      SEMANTIC_MAX_CLAIMS_PER_PAIR: "${SEMANTIC_MAX_CLAIMS_PER_PAIR:-10}"
      LLM_PAIR_DIFF_ENABLED: "${LLM_PAIR_DIFF_ENABLED:-false}"
      LLM_PAIR_DIFF_MODEL: "${LLM_PAIR_DIFF_MODEL:-}"
      LLM_PAIR_DIFF_CHAR_BUDGET: "${LLM_PAIR_DIFF_CHAR_BUDGET:-12000}"
      KEEP_FUZZY_WITH_LLM_PAIR_DIFF: "${KEEP_FUZZY_WITH_LLM_PAIR_DIFF:-false}"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  worker:
    build: .
    command: celery -A docdiffops.worker.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      DATA_DIR: /data
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg2://docdiff:docdiff@db:5432/docdiff
      SEMANTIC_COMPARATOR_ENABLED: "${SEMANTIC_COMPARATOR_ENABLED:-false}"
      LLM_API_BASE: "${LLM_API_BASE:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      SEMANTIC_MAX_CLAIMS_PER_PAIR: "${SEMANTIC_MAX_CLAIMS_PER_PAIR:-10}"
      LLM_PAIR_DIFF_ENABLED: "${LLM_PAIR_DIFF_ENABLED:-false}"
      LLM_PAIR_DIFF_MODEL: "${LLM_PAIR_DIFF_MODEL:-}"
      LLM_PAIR_DIFF_CHAR_BUDGET: "${LLM_PAIR_DIFF_CHAR_BUDGET:-12000}"
      KEEP_FUZZY_WITH_LLM_PAIR_DIFF: "${KEEP_FUZZY_WITH_LLM_PAIR_DIFF:-false}"
    volumes:
      - ./data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
